name: Release Obsidian Plugin
on:
  push:
    branches: [main]
    tags: ["*"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "24.x"

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 8
          run_install: false

      - name: Get latest tag
        id: latest_tag
        run: |
          latest=$(git describe --abbrev=0 --tags 2>/dev/null || echo "0.0.0")
          echo "tag=$latest" >> $GITHUB_OUTPUT

      - name: Get manifest version
        id: manifest_version
        run: |
          version=$(jq -r '.version' manifest.json)
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Check for newer version
        id: check
        run: |
          latest="${{ steps.latest_tag.outputs.tag }}"
          manifest="${{ steps.manifest_version.outputs.version }}"
          if [ "$(printf '%s\n' "$latest" "$manifest" | sort -V | head -n1)" == "$latest" ] && [ "$latest" != "$manifest" ]; then
            echo "newer=true" >> $GITHUB_OUTPUT
          else
            echo "newer=false" >> $GITHUB_OUTPUT
          fi

      - name: Build
        if: steps.check.outputs.newer == 'true'
        run: |
          pnpm i
          pnpm run build

      - name: Get version info
        if: steps.check.outputs.newer == 'true'
        id: version
        run: |
          echo "name=${{ steps.manifest_version.outputs.version }}" >> $GITHUB_OUTPUT

      - name: Prepare manifest file
        if: steps.check.outputs.newer == 'true'
        run: |
          if [[ "${{ contains(steps.version.outputs.name, '-beta') }}" == 'true' ]]; then
            cp manifest-beta.json manifest.json
          else
            echo "do nothing"
          fi
        shell: bash

      - name: Package plugin archive
        if: steps.check.outputs.newer == 'true'
        run: |
          mkdir ${{ github.event.repository.name }}
          cp main.js styles.css manifest.json README.md ${{ github.event.repository.name }}
          zip -r ${{ github.event.repository.name }}-${{ steps.version.outputs.name }}.zip ${{ github.event.repository.name }}

      - name: Create git tag
        if: steps.check.outputs.newer == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.manifest_version.outputs.version }}
          git push origin ${{ steps.manifest_version.outputs.version }}

      - name: Create release
        if: steps.check.outputs.newer == 'true'
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            ${{ github.event.repository.name }}-${{ steps.version.outputs.name }}.zip
          name: ${{ steps.version.outputs.name }}
          prerelease: ${{ contains(steps.version.outputs.name, '-beta') }}
          tag_name: ${{ steps.manifest_version.outputs.version }}
          token: ${{ secrets.GITHUB_TOKEN }}